<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MBTI 資料</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3eb;
      --panel: rgba(255, 255, 255, 0.88);
      --ink: #27313f;
      --muted: #687386;
      --accent: #6f5de7;
      --accent-2: #19a7a8;
      --ring: rgba(111, 93, 231, 0.28);
      --shadow: 0 18px 45px rgba(42, 39, 58, 0.16);
      --radius: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 201, 121, 0.38), transparent 34rem),
        radial-gradient(circle at 90% 8%, rgba(119, 215, 216, 0.34), transparent 28rem),
        linear-gradient(135deg, #fbf7ef 0%, var(--bg) 55%, #eef7f7 100%);
    }

    button, input, select { font: inherit; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    input[type="search"], .tag-input, .sort-select {
      border: 1px solid rgba(104, 115, 134, 0.24);
      border-radius: 999px;
      padding: 11px 14px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.82);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input[type="search"]:focus, .tag-input:focus, .sort-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .paste-highlight {
      outline: 4px solid var(--ring);
      outline-offset: 4px;
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .app-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 3vw, 28px);
    }

    .viewer-card {
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
      padding: 16px;
    }

    .toolbar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toolbar-title {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 950;
    }

    .toolbar-toggle {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(42, 39, 58, 0.16);
    }

    .toolbar-content {
      display: grid;
      gap: 14px;
    }

    .toolbar-content[hidden] { display: none; }

    .size-control {
      display: grid;
      grid-template-columns: auto minmax(180px, 420px) auto;
      gap: 12px;
      align-items: center;
      width: min(100%, 620px);
      color: var(--muted);
      font-weight: 800;
    }

    .auth-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 800;
    }

    .auth-button, .upload-button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .auth-button {
      color: var(--accent);
      background: rgba(111, 93, 231, 0.12);
    }

    .upload-control {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border: 0;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 28px rgba(42, 39, 58, 0.18);
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .upload-control:hover, .upload-control:focus-within {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(42, 39, 58, 0.22);
    }

    .upload-control[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .upload-control input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .search-control, .sort-control {
      display: grid;
      gap: 7px;
      min-width: min(100%, 320px);
      color: var(--muted);
      font-weight: 900;
    }

    .search-control input, .sort-select { width: 100%; }

    .sort-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: end;
    }

    .sort-control {
      min-width: min(100%, 240px);
      color: var(--muted);
      font-weight: 900;
    }

    .sort-save-button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      color: white;
      background: var(--accent);
      font-weight: 950;
      cursor: pointer;
    }

    .upload-note, .empty-message {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .status-area {
      display: grid;
      gap: 10px;
    }

    .status-message {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 0;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 0.92rem;
      font-weight: 800;
      line-height: 1.55;
    }

    .status-message[hidden] { display: none; }

    .status-message--success {
      color: #146c43;
      background: rgba(25, 135, 84, 0.12);
      border: 1px solid rgba(25, 135, 84, 0.24);
    }

    .status-message--error {
      color: #842029;
      background: rgba(220, 53, 69, 0.12);
      border: 1px solid rgba(220, 53, 69, 0.26);
    }

    .status-content { display: grid; gap: 6px; }

    .status-title {
      display: block;
      font-size: 1rem;
      font-weight: 950;
    }

    .status-detail { margin: 0; }

    .status-close {
      flex: 0 0 auto;
      border: 0;
      border-radius: 999px;
      width: 28px;
      height: 28px;
      color: currentColor;
      background: rgba(255, 255, 255, 0.62);
      cursor: pointer;
      font-weight: 950;
      line-height: 1;
    }

    .empty-message {
      grid-column: 1 / -1;
      padding: 28px;
      text-align: center;
    }

    .size-control input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .gallery {
      display: grid;
      gap: var(--gap, 16px);
      grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min, 240px)), 1fr));
      align-items: start;
    }


    .viewer-card {
      overflow: hidden;
      cursor: pointer;
      transform: translateY(0);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .viewer-card:focus-within, .viewer-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 54px rgba(42, 39, 58, 0.2);
    }

    .toolbar.viewer-card { cursor: default; }
    .toolbar.viewer-card:hover, .toolbar.viewer-card:focus-within { transform: none; }

    .image-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .image-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: #e8edf4;
    }

    .image-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }

    .badge {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      color: white;
      background: rgba(39, 49, 63, 0.72);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .card-details {
      display: grid;
      gap: 12px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.64);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 28px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      background: rgba(39, 49, 63, 0.72);
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1;
    }

    .tag-form {
      display: flex;
      gap: 8px;
    }

    .tag-input {
      min-width: 0;
      flex: 1;
    }

    .tag-submit {
      border: 0;
      border-radius: 999px;
      padding: 0 13px;
      color: white;
      background: var(--accent);
      font-weight: 900;
      cursor: pointer;
    }

    .card-admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .replace-control, .delete-button, .move-button {
      justify-self: start;
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 950;
      cursor: pointer;
    }

    .replace-control {
      color: var(--accent);
      background: rgba(111, 93, 231, 0.12);
    }

    .replace-control:hover, .replace-control:focus-visible {
      background: rgba(111, 93, 231, 0.2);
    }

    .delete-button {
      color: #842029;
      background: rgba(220, 53, 69, 0.12);
    }

    .delete-button:hover, .delete-button:focus-visible {
      background: rgba(220, 53, 69, 0.2);
    }

    .move-button {
      color: var(--muted);
      background: rgba(104, 115, 134, 0.12);
    }

    .move-button:hover, .move-button:focus-visible {
      background: rgba(104, 115, 134, 0.2);
    }

    .viewer-card[draggable="true"] { cursor: grab; }

    .viewer-card.is-dragging { opacity: 0.52; }

    .viewer-card.is-drop-target { outline: 4px solid var(--ring); outline-offset: -4px; }


    @media (max-width: 560px) {
      .app-shell { padding: 12px; }
      .toolbar {
        gap: 10px;
        margin-bottom: 14px;
        padding: 12px;
        border-radius: 20px;
      }
      .toolbar-actions { align-items: stretch; }
      .size-control { grid-template-columns: auto minmax(120px, 1fr) auto; }
      .auth-actions { width: 100%; }
      .upload-control { justify-content: center; width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="toolbar viewer-card" aria-label="一覧操作">
      <div class="toolbar-header">
        <p class="toolbar-title">表示・検索メニュー</p>
        <button id="toolbarToggle" class="toolbar-toggle" type="button" aria-expanded="false" aria-controls="toolbarContent">メニューを開く</button>
      </div>
      <div id="toolbarContent" class="toolbar-content" hidden>
        <div class="toolbar-actions">
          <label class="size-control" for="sizeRange">
            <span>小</span>
            <input id="sizeRange" type="range" min="160" max="1180" step="20" value="240" aria-label="一覧画像の大きさ">
            <span>大</span>
          </label>
          <label class="search-control" for="searchInput">
            <span>タグ検索</span>
            <input id="searchInput" type="search" placeholder="例: NT、内向、チーム" autocomplete="off" aria-label="タグで資料を検索">
          </label>
          <div class="sort-tools">
            <label class="sort-control" for="sortSelect">
              <span>表示順</span>
              <select id="sortSelect" class="sort-select" aria-label="画像の表示順">
                <option value="createdAt">作成日順</option>
                <option value="custom">保存した並び順</option>
              </select>
            </label>
            <button id="saveOrderButton" class="sort-save-button" type="button" disabled>現在の表示順で保存</button>
          </div>
          <div class="auth-actions" aria-live="polite">
            <span id="authStatus">ログインしていません</span>
            <button id="loginButton" class="auth-button" type="button">Googleでログイン</button>
            <button id="logoutButton" class="auth-button" type="button" hidden>ログアウト</button>
          </div>
          <label id="uploadControl" class="upload-control" for="imageUpload" aria-disabled="true">
            <span id="uploadLabel">画像を追加</span>
            <input id="imageUpload" type="file" accept="image/*" multiple aria-label="追加する画像を選択" disabled>
          </label>
        </div>
        <div class="status-area" aria-live="polite">
          <p id="uploadNote" class="upload-note">PCでは画像ファイルの選択に加えて、クリップボードの画像をそのまま Ctrl+V / ⌘V で貼り付けて追加できます。アップロードにはGoogleログインが必要です。</p>
          <div id="operationStatus" class="status-message" hidden></div>
        </div>
      </div>
    </section>
    <section id="gallery" class="gallery" aria-label="MBTI資料サンプル一覧"></section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, onAuthStateChanged, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, addDoc, collection, deleteDoc, onSnapshot, query, serverTimestamp, updateDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { deleteObject, getDownloadURL, getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDwIdnlDMOsu_dVvyDluC7TI-aa_dK6SFs",
      authDomain: "mbti-materials.firebaseapp.com",
      projectId: "mbti-materials",
      storageBucket: "mbti-materials.firebasestorage.app",
      messagingSenderId: "454015561766",
      appId: "1:454015561766:web:c749e2a5e57d20dffbb6e7"
    };

    // 管理者UIDはこの1か所だけ変更してください。Security RulesのADMIN_UIDと同じ値にします。
    const ADMIN_UID = "AutvrLYLvOfLUHhSbnVSaQMe9AT2";
    const MAX_IMAGE_SIZE_BYTES = 10 * 1024 * 1024;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    const materials = [];
    let currentUser = null;
    let isUploading = false;
    let replacingMaterialId = "";
    let draggedMaterialId = "";
    let hasInitializedSort = false;

    const gallery = document.querySelector("#gallery");
    const sizeRange = document.querySelector("#sizeRange");
    const imageUpload = document.querySelector("#imageUpload");
    const searchInput = document.querySelector("#searchInput");
    const uploadNote = document.querySelector("#uploadNote");
    const authStatus = document.querySelector("#authStatus");
    const loginButton = document.querySelector("#loginButton");
    const logoutButton = document.querySelector("#logoutButton");
    const uploadControl = document.querySelector("#uploadControl");
    const uploadLabel = document.querySelector("#uploadLabel");
    const sortSelect = document.querySelector("#sortSelect");
    const saveOrderButton = document.querySelector("#saveOrderButton");
    const operationStatus = document.querySelector("#operationStatus");
    const toolbarToggle = document.querySelector("#toolbarToggle");
    const toolbarContent = document.querySelector("#toolbarContent");
    const minCardSize = Number(sizeRange.min);
    const maxCardSize = Number(sizeRange.max);

    function canUpload() {
      return Boolean(currentUser && currentUser.uid === ADMIN_UID);
    }

    function setToolbarExpanded(isExpanded) {
      toolbarContent.hidden = !isExpanded;
      toolbarToggle.setAttribute("aria-expanded", String(isExpanded));
      toolbarToggle.textContent = isExpanded ? "メニューを閉じる" : "メニューを開く";
    }


    function setMessage(message) {
      uploadNote.textContent = message;
    }

    function clearOperationStatus() {
      operationStatus.hidden = true;
      operationStatus.className = "status-message";
      operationStatus.innerHTML = "";
    }

    function showSuccessMessage(message) {
      operationStatus.hidden = false;
      operationStatus.className = "status-message status-message--success";
      operationStatus.innerHTML = `
        <div class="status-content">
          <strong class="status-title">処理完了</strong>
          <p class="status-detail">${escapeHtml(message)}</p>
        </div>
        <button class="status-close" type="button" aria-label="成功メッセージを閉じる">×</button>
      `;
    }

    function getFirebaseUserMessage(errorCode, stage) {
      if (errorCode === "storage/unauthorized") return "Storageのアクセス権限によってアップロードまたは取得が拒否されました。";
      if (errorCode?.startsWith("storage/")) return "Storage処理で権限または通信の問題が発生しました。";
      if (errorCode?.startsWith("auth/")) return "Googleログインまたはログアウトの認証処理で問題が発生しました。";
      if (errorCode?.startsWith("firestore/")) return "Firestoreの読み書き権限または通信に問題が発生しました。";
      if (stage?.includes("Firestore")) return "Firestoreの処理中に問題が発生しました。";
      return "Firebase処理で問題が発生しました。時間をおいて再度お試しください。";
    }

    function showFirebaseError(stage, error) {
      const errorCode = error?.code || "コードなし";
      const errorMessage = error?.message || String(error || "詳細不明のエラー");
      const userMessage = getFirebaseUserMessage(error?.code, stage);
      operationStatus.hidden = false;
      operationStatus.className = "status-message status-message--error";
      operationStatus.innerHTML = `
        <div class="status-content">
          <strong class="status-title">Firebaseエラー</strong>
          <p class="status-detail">処理：${escapeHtml(stage)}</p>
          <p class="status-detail">コード：${escapeHtml(errorCode)}</p>
          <p class="status-detail">内容：${escapeHtml(errorMessage)}</p>
          <p class="status-detail">${escapeHtml(userMessage)}</p>
        </div>
        <button class="status-close" type="button" aria-label="エラーメッセージを閉じる">×</button>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[char]));
    }

    function applyCardSize(size) {
      const clampedSize = Math.min(maxCardSize, Math.max(minCardSize, Number(size)));
      document.documentElement.style.setProperty("--card-min", `${clampedSize}px`);
      document.documentElement.style.setProperty("--gap", `${Math.max(12, Math.round(clampedSize * 0.055))}px`);
      sizeRange.value = clampedSize;
    }

    function itemTags(item) {
      return Array.isArray(item.tags) ? item.tags : [];
    }

    function matchesSearch(item, queryText) {
      if (!queryText) return true;
      return itemTags(item).some((tag) => tag.toLowerCase().includes(queryText));
    }

    function timestampMillis(value) {
      if (typeof value?.toMillis === "function") return value.toMillis();
      if (typeof value?.seconds === "number") return value.seconds * 1000;
      return 0;
    }

    function customOrderValue(item) {
      return Number.isFinite(item.sortOrder) ? item.sortOrder : timestampMillis(item.createdAt);
    }

    function compareByTitle(a, b) {
      return (a.title || a.originalFileName || "").localeCompare(b.title || b.originalFileName || "", "ja");
    }

    function sortedMaterials() {
      return [...materials].sort((a, b) => {
        if (sortSelect.value === "custom") {
          return customOrderValue(a) - customOrderValue(b) || timestampMillis(a.createdAt) - timestampMillis(b.createdAt) || compareByTitle(a, b);
        }
        return timestampMillis(a.createdAt) - timestampMillis(b.createdAt) || compareByTitle(a, b);
      });
    }

    function visibleEntries() {
      const queryText = searchInput.value.trim().toLowerCase();
      return sortedMaterials()
        .map((item, displayIndex) => ({ item, displayIndex, materialIndex: materials.findIndex((material) => material.id === item.id) }))
        .filter(({ item }) => matchesSearch(item, queryText));
    }

    function renderGallery() {
      const queryText = searchInput.value.trim().toLowerCase();
      const visibleItems = visibleEntries();

      if (!visibleItems.length) {
        gallery.innerHTML = `<p class="empty-message">${queryText ? "一致するタグの画像がありません。別のキーワードで検索してください。" : "Firestoreに保存された画像はまだありません。"}</p>`;
        saveOrderButton.disabled = true;
        return;
      }

      gallery.innerHTML = visibleItems.map(({ item, materialIndex }, visibleIndex) => {
        const title = escapeHtml(item.title || item.originalFileName || "無題の画像");
        const tags = itemTags(item).map((value) => `<span class="tag-chip">${escapeHtml(value)}</span>`).join("");
        const src = escapeHtml(item.imageUrl);
        const canEditTags = canUpload();
        const adminControls = canEditTags ? `
          <div class="card-admin-actions">
            <button class="move-button" type="button" data-move-index="${visibleIndex}" data-move-direction="-1" ${visibleIndex === 0 ? "disabled" : ""}>前へ</button>
            <button class="move-button" type="button" data-move-index="${visibleIndex}" data-move-direction="1" ${visibleIndex === visibleItems.length - 1 ? "disabled" : ""}>後へ</button>
            <label class="replace-control" for="replace-${escapeHtml(item.id)}" aria-label="${title}を上書き">
              画像を上書き
              <input id="replace-${escapeHtml(item.id)}" class="sr-only replace-input" type="file" accept="image/*" data-replace-index="${materialIndex}">
            </label>
            <button class="delete-button" type="button" data-delete-index="${materialIndex}" aria-label="${title}を削除">画像を削除</button>
          </div>
        ` : "";

        return `
          <article class="viewer-card" draggable="${canEditTags}" data-material-id="${escapeHtml(item.id)}">
            <button class="image-button" type="button" data-index="${materialIndex}" aria-label="${title}を表示">
              <div class="image-wrap"><img src="${src}" alt="${title}"><span class="badge">${escapeHtml(item.originalFileName || "画像")}</span></div>
            </button>
            <div class="card-details">
              <div class="tag-list" aria-label="${title}のタグ">${tags || "<span class=\"upload-note\">タグなし</span>"}</div>
              <form class="tag-form" data-index="${materialIndex}" aria-label="${title}にタグを追加">
                <input class="tag-input" name="tag" type="text" placeholder="タグを追加" autocomplete="off" aria-label="追加するタグ" ${canEditTags ? "" : "disabled"}>
                <button class="tag-submit" type="submit" ${canEditTags ? "" : "disabled"}>追加</button>
              </form>
              ${adminControls}
            </div>
          </article>
        `;
      }).join("");
      saveOrderButton.disabled = !canUpload() || !visibleItems.length;
    }

    function updateAuthUi() {
      const uploadAllowed = canUpload() && !isUploading && !replacingMaterialId;
      imageUpload.disabled = !uploadAllowed;
      uploadControl.setAttribute("aria-disabled", String(!uploadAllowed));
      uploadLabel.textContent = isUploading ? "アップロード中..." : "画像を追加";
      loginButton.hidden = Boolean(currentUser);
      logoutButton.hidden = !currentUser;
      authStatus.textContent = currentUser ? `${currentUser.displayName || "ログイン中"}でログイン中` : "ログインしていません";
      if (!currentUser) setMessage("閲覧はログイン不要です。アップロードするにはGoogleログインしてください。");
      else if (!canUpload()) setMessage("このGoogleアカウントにはアップロード権限がありません。管理者UIDを設定してください。");
      else if (replacingMaterialId) setMessage("画像を上書き中です。完了までお待ちください。");
      else setMessage("画像ファイルを選択、または Ctrl+V / ⌘V で貼り付けてアップロードできます。各画像の「画像を上書き」から差し替えもできます。");
      renderGallery();
    }

    function resetMaterialsToCurrentDisplayOrder() {
      materials.splice(0, materials.length, ...sortedMaterials());
    }

    function applyLocalCustomOrder() {
      materials.forEach((item, index) => { item.sortOrder = index + 1; });
    }

    function moveVisibleItem(fromIndex, direction) {
      const entries = visibleEntries();
      const toIndex = fromIndex + direction;
      if (toIndex < 0 || toIndex >= entries.length) return;
      const fromMaterial = entries[fromIndex].item;
      const toMaterial = entries[toIndex].item;
      resetMaterialsToCurrentDisplayOrder();
      const fromPosition = materials.findIndex((item) => item.id === fromMaterial.id);
      const toPosition = materials.findIndex((item) => item.id === toMaterial.id);
      if (fromPosition < 0 || toPosition < 0) return;
      materials.splice(fromPosition, 1);
      materials.splice(toPosition, 0, fromMaterial);
      applyLocalCustomOrder();
      sortSelect.value = "custom";
      renderGallery();
    }

    function moveDraggedItem(targetMaterialId) {
      if (!draggedMaterialId || draggedMaterialId === targetMaterialId) return;
      resetMaterialsToCurrentDisplayOrder();
      const fromPosition = materials.findIndex((item) => item.id === draggedMaterialId);
      const toPosition = materials.findIndex((item) => item.id === targetMaterialId);
      if (fromPosition < 0 || toPosition < 0) return;
      const [draggedItem] = materials.splice(fromPosition, 1);
      materials.splice(toPosition, 0, draggedItem);
      applyLocalCustomOrder();
      sortSelect.value = "custom";
      renderGallery();
    }

    async function saveCurrentOrder() {
      if (!canUpload()) {
        setMessage("並び順の保存には管理者Googleアカウントでのログインが必要です。");
        return;
      }
      const entries = visibleEntries();
      if (!entries.length) return;
      const batch = writeBatch(db);
      entries.forEach(({ item }, index) => {
        batch.update(doc(db, "materials", item.id), { sortOrder: index + 1, orderUpdatedAt: serverTimestamp() });
      });
      try {
        await batch.commit();
        sortSelect.value = "custom";
        showSuccessMessage("現在表示されている順番を保存しました。次回以降もこの順番で表示できます。");
      } catch (error) {
        console.error("Order save failed", error);
        showFirebaseError("並び順保存", error);
      }
    }

    function maximizeFromList(index) {
      applyCardSize(maxCardSize);
      const card = gallery.querySelector(`[data-index="${index}"]`)?.closest(".viewer-card");
      card?.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function validateImageFile(file) {
      if (!file.type.startsWith("image/")) return `${file.name || "選択ファイル"}は画像ファイルではありません。`;
      if (file.size > MAX_IMAGE_SIZE_BYTES) return `${file.name || "画像"}はサイズ上限（10MB）を超えています。`;
      return "";
    }

    async function deleteMaterial(index) {
      if (!canUpload()) {
        setMessage("削除には管理者Googleアカウントでのログインが必要です。");
        return;
      }

      const item = materials[index];
      if (!item) return;

      const title = item.title || item.originalFileName || "この画像";
      if (!window.confirm(`${title}を削除しますか？この操作は元に戻せません。`)) return;

      try {
        if (item.storagePath) {
          try {
            await deleteObject(ref(storage, item.storagePath));
          } catch (error) {
            if (error?.code !== "storage/object-not-found") throw error;
          }
        }
        await deleteDoc(doc(db, "materials", item.id));
        showSuccessMessage(`${title}を削除しました。`);
      } catch (error) {
        console.error("Material deletion failed", error);
        showFirebaseError("画像削除", error);
      }
    }

    async function replaceMaterialImage(index, file) {
      if (!canUpload()) {
        setMessage("画像の上書きには管理者Googleアカウントでのログインが必要です。");
        return false;
      }

      const item = materials[index];
      if (!item || !file) return false;

      const validationMessage = validateImageFile(file);
      if (validationMessage) {
        setMessage(validationMessage);
        return false;
      }

      const previousTitle = item.title || item.originalFileName || "この画像";
      const extension = file.name.includes(".") ? file.name.split(".").pop().toLowerCase() : "bin";
      const fallbackName = `${crypto.randomUUID()}.${extension}`;
      const storagePath = item.storagePath || `users/${currentUser.uid}/images/${fallbackName}`;
      const storageRef = ref(storage, storagePath);

      replacingMaterialId = item.id;
      updateAuthUi();
      setMessage(`${previousTitle}を上書き中です...`);

      try {
        try {
          await uploadBytes(storageRef, file, { contentType: file.type });
        } catch (error) {
          console.error("Firebase replacement failed at Storage upload", error);
          showFirebaseError("Storage上書きアップロード", error);
          throw error;
        }

        let imageUrl = "";
        try {
          imageUrl = await getDownloadURL(storageRef);
        } catch (error) {
          console.error("Firebase replacement failed at download URL retrieval", error);
          showFirebaseError("上書き後ダウンロードURL取得", error);
          throw error;
        }

        try {
          await updateDoc(doc(db, "materials", item.id), {
            title: file.name?.replace(/\.[^/.]+$/, "") || item.title || "上書き画像",
            imageUrl,
            storagePath,
            originalFileName: file.name || item.originalFileName || fallbackName,
            updatedAt: serverTimestamp()
          });
        } catch (error) {
          console.error("Firebase replacement failed at Firestore update", error);
          showFirebaseError("Firestore上書き更新", error);
          throw error;
        }

        showSuccessMessage(`${previousTitle}を${file.name || "選択した画像"}で上書きしました。`);
        return true;
      } catch (error) {
        return false;
      } finally {
        replacingMaterialId = "";
        updateAuthUi();
      }
    }

    async function uploadImageFiles(files, sourceLabel = "Upload") {
      if (!canUpload()) {
        setMessage("アップロードには管理者Googleアカウントでのログインが必要です。");
        return false;
      }

      const fileList = [...files];
      const errors = fileList.map(validateImageFile).filter(Boolean);
      const imageFiles = fileList.filter((file) => !validateImageFile(file));
      if (errors.length) {
        console.warn("Rejected files", errors);
        setMessage(errors[0]);
      }
      if (!imageFiles.length) return false;

      isUploading = true;
      updateAuthUi();
      setMessage(`${imageFiles.length}枚の画像をアップロード中です...`);

      try {
        await Promise.all(imageFiles.map(async (file) => {
          const extension = file.name.includes(".") ? file.name.split(".").pop().toLowerCase() : "bin";
          const uniqueName = `${crypto.randomUUID()}.${extension}`;
          const storagePath = `users/${currentUser.uid}/images/${uniqueName}`;
          const storageRef = ref(storage, storagePath);
          let imageUrl = "";

          try {
            await uploadBytes(storageRef, file, { contentType: file.type });
          } catch (error) {
            console.error("Firebase upload failed at Storage upload", error);
            showFirebaseError("Storageアップロード", error);
            throw error;
          }

          try {
            imageUrl = await getDownloadURL(storageRef);
          } catch (error) {
            console.error("Firebase upload failed at download URL retrieval", error);
            showFirebaseError("ダウンロードURL取得", error);
            throw error;
          }

          try {
            await addDoc(collection(db, "materials"), {
              title: file.name?.replace(/\.[^/.]+$/, "") || `${sourceLabel}画像`,
              tags: [],
              imageUrl,
              storagePath,
              ownerId: currentUser.uid,
              originalFileName: file.name || uniqueName,
              createdAt: serverTimestamp()
            });
          } catch (error) {
            console.error("Firebase upload failed at Firestore registration", error);
            showFirebaseError("Firestore登録", error);
            throw error;
          }
        }));
        showSuccessMessage(`${imageFiles.length}枚の画像をアップロードしました。`);
        return true;
      } catch (error) {
        return false;
      } finally {
        isUploading = false;
        updateAuthUi();
      }
    }

    loginButton.addEventListener("click", async () => {
      try { await signInWithPopup(auth, provider); }
      catch (error) {
        console.error("Google login failed", error);
        showFirebaseError("Googleログイン", error);
      }
    });

    logoutButton.addEventListener("click", async () => {
      try { await signOut(auth); }
      catch (error) {
        console.error("Logout failed", error);
        showFirebaseError("ログアウト", error);
      }
    });

    imageUpload.addEventListener("change", async (event) => {
      await uploadImageFiles(event.target.files);
      event.target.value = "";
    });

    document.addEventListener("paste", async (event) => {
      const clipboardFiles = [...event.clipboardData?.items || []]
        .filter((item) => item.kind === "file")
        .map((item) => item.getAsFile())
        .filter(Boolean);
      if (!clipboardFiles.length) return;
      event.preventDefault();
      await uploadImageFiles(clipboardFiles, "Paste");
      document.body.classList.add("paste-highlight");
      window.setTimeout(() => document.body.classList.remove("paste-highlight"), 420);
    });

    gallery.addEventListener("submit", async (event) => {
      const form = event.target.closest(".tag-form");
      if (!form) return;
      event.preventDefault();
      if (!canUpload()) {
        setMessage("タグ追加には管理者Googleアカウントでのログインが必要です。");
        return;
      }
      const input = form.elements.tag;
      const value = input.value.trim();
      if (!value) return;
      const item = materials[Number(form.dataset.index)];
      const tags = itemTags(item);
      if (tags.some((tag) => tag.toLowerCase() === value.toLowerCase())) {
        input.value = "";
        return;
      }
      try {
        await updateDoc(doc(db, "materials", item.id), { tags: [...tags, value] });
        input.value = "";
      } catch (error) {
        console.error("Tag update failed", error);
        showFirebaseError("タグ更新", error);
      }
    });

    gallery.addEventListener("change", async (event) => {
      const input = event.target.closest(".replace-input");
      if (!input) return;
      const [file] = input.files || [];
      await replaceMaterialImage(Number(input.dataset.replaceIndex), file);
      input.value = "";
    });

    gallery.addEventListener("click", async (event) => {
      const deleteButton = event.target.closest(".delete-button");
      const moveButton = event.target.closest(".move-button");
      if (moveButton) {
        moveVisibleItem(Number(moveButton.dataset.moveIndex), Number(moveButton.dataset.moveDirection));
        return;
      }

      if (deleteButton) {
        await deleteMaterial(Number(deleteButton.dataset.deleteIndex));
        return;
      }

      const button = event.target.closest(".image-button");
      if (button) maximizeFromList(Number(button.dataset.index));
    });

    gallery.addEventListener("dragstart", (event) => {
      const card = event.target.closest(".viewer-card[draggable=\"true\"]");
      if (!card || !canUpload()) return;
      draggedMaterialId = card.dataset.materialId;
      card.classList.add("is-dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedMaterialId);
    });

    gallery.addEventListener("dragover", (event) => {
      const card = event.target.closest(".viewer-card[draggable=\"true\"]");
      if (!card || !draggedMaterialId) return;
      event.preventDefault();
      card.classList.add("is-drop-target");
    });

    gallery.addEventListener("dragleave", (event) => {
      event.target.closest(".viewer-card")?.classList.remove("is-drop-target");
    });

    gallery.addEventListener("drop", (event) => {
      const card = event.target.closest(".viewer-card[draggable=\"true\"]");
      if (!card || !draggedMaterialId) return;
      event.preventDefault();
      moveDraggedItem(card.dataset.materialId);
    });

    gallery.addEventListener("dragend", () => {
      draggedMaterialId = "";
      gallery.querySelectorAll(".is-dragging, .is-drop-target").forEach((card) => card.classList.remove("is-dragging", "is-drop-target"));
    });

    operationStatus.addEventListener("click", (event) => {
      if (event.target.closest(".status-close")) clearOperationStatus();
    });

    toolbarToggle.addEventListener("click", () => {
      setToolbarExpanded(toolbarContent.hidden);
    });

    sizeRange.addEventListener("input", (event) => applyCardSize(event.target.value));
    searchInput.addEventListener("input", renderGallery);
    sortSelect.addEventListener("change", renderGallery);
    saveOrderButton.addEventListener("click", saveCurrentOrder);
    applyCardSize(sizeRange.value);
    updateAuthUi();

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      updateAuthUi();
    });

    onSnapshot(query(collection(db, "materials")), (snapshot) => {
      materials.splice(0, materials.length, ...snapshot.docs.map((documentSnapshot) => ({
        id: documentSnapshot.id,
        ...documentSnapshot.data()
      })));
      if (!hasInitializedSort) {
        sortSelect.value = materials.some((item) => Number.isFinite(item.sortOrder)) ? "custom" : "createdAt";
        hasInitializedSort = true;
      }
      renderGallery();
    }, (error) => {
      console.error("Firestore materials subscription failed", error);
      showFirebaseError("Firestore一覧取得", error);
    });
  </script>
</body>
</html>
