<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MBTI 資料</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3eb;
      --panel: rgba(255, 255, 255, 0.88);
      --ink: #27313f;
      --muted: #687386;
      --accent: #6f5de7;
      --accent-2: #19a7a8;
      --ring: rgba(111, 93, 231, 0.28);
      --shadow: 0 18px 45px rgba(42, 39, 58, 0.16);
      --radius: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 201, 121, 0.38), transparent 34rem),
        radial-gradient(circle at 90% 8%, rgba(119, 215, 216, 0.34), transparent 28rem),
        linear-gradient(135deg, #fbf7ef 0%, var(--bg) 55%, #eef7f7 100%);
    }

    button, input { font: inherit; }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .app-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 3vw, 28px);
    }

    .viewer-card {
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
      padding: 16px;
    }

    .size-control {
      display: grid;
      grid-template-columns: auto minmax(180px, 420px) auto;
      gap: 12px;
      align-items: center;
      width: min(100%, 620px);
      color: var(--muted);
      font-weight: 800;
    }

    .upload-control {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border: 0;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 28px rgba(42, 39, 58, 0.18);
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .upload-control:hover, .upload-control:focus-within {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(42, 39, 58, 0.22);
    }

    .upload-control input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .upload-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .size-control input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .gallery {
      display: grid;
      gap: var(--gap, 16px);
      grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min, 240px)), 1fr));
      align-items: start;
    }


    .viewer-card {
      overflow: hidden;
      cursor: pointer;
      transform: translateY(0);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .viewer-card:focus-within, .viewer-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 54px rgba(42, 39, 58, 0.2);
    }

    .toolbar.viewer-card { cursor: default; }
    .toolbar.viewer-card:hover, .toolbar.viewer-card:focus-within { transform: none; }

    .image-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .image-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: #e8edf4;
    }

    .image-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }

    .badge {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      color: white;
      background: rgba(39, 49, 63, 0.72);
      font-size: 0.78rem;
      font-weight: 900;
    }


    @media (max-width: 560px) {
      .app-shell { padding: 12px; }
      .toolbar-actions { align-items: stretch; }
      .size-control { grid-template-columns: auto minmax(120px, 1fr) auto; }
      .upload-control { justify-content: center; width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="toolbar viewer-card" aria-label="一覧操作">
      <div class="toolbar-actions">
        <label class="size-control" for="sizeRange">
          <span>小</span>
          <input id="sizeRange" type="range" min="160" max="1180" step="20" value="240" aria-label="一覧画像の大きさ">
          <span>大</span>
        </label>
        <label class="upload-control" for="imageUpload">
          <span>画像を追加</span>
          <input id="imageUpload" type="file" accept="image/*" multiple aria-label="追加する画像を選択">
        </label>
      </div>
      <p class="upload-note">アップロードした画像はこのページを開いている間だけ表示されます。リロードすると消えます。</p>
    </section>
    <section id="gallery" class="gallery" aria-label="MBTI資料サンプル一覧"></section>
  </main>

  <script>
    const palette = [
      ["#6f5de7", "#19a7a8"], ["#f06f6f", "#ffd166"], ["#2f80ed", "#56ccf2"], ["#27ae60", "#a8e063"],
      ["#9b51e0", "#f2994a"], ["#00a8a8", "#b2f7ef"], ["#eb5757", "#f2c94c"], ["#4f4f4f", "#bdbdbd"]
    ];

    const materials = [
      ["サンプル", "アップロードされたサンプル画像", "Sample", "sample.jpg", "https://raw.githubusercontent.com/mina78910/MBTI-images/main/sample.jpg"],
      ["全体像", "16タイプを4つの気質グループで眺める導入資料", "NT / NF / SJ / SP"],
      ["内向・外向", "エネルギーの向きの違いを会話の場面で比較", "E / I"],
      ["感覚・直観", "情報の受け取り方を地図とアイデアで表現", "S / N"],
      ["思考・感情", "判断軸の違いをチーム相談の例で確認", "T / F"],
      ["判断・知覚", "予定の立て方と柔軟性をワーク風に整理", "J / P"],
      ["相性メモ", "タイプ差を尊重しながら話すためのヒント", "Tips"],
      ["チーム配置", "役割分担を考えるためのテーブル用資料", "Team"],
      ["振り返り", "自己理解を深める問いをまとめた共有カード", "Review"]
    ];

    function svgData([title, description, tag], index) {
      const [a, b] = palette[index % palette.length];
      const safeTitle = title.replace(/&/g, "&amp;");
      const safeDesc = description.replace(/&/g, "&amp;");
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="${safeTitle}">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${a}"/><stop offset="1" stop-color="${b}"/></linearGradient>
            <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity="0.2"/></filter>
          </defs>
          <rect width="1200" height="900" fill="#fbf8f0"/>
          <circle cx="1030" cy="120" r="220" fill="${b}" opacity=".22"/>
          <circle cx="120" cy="820" r="260" fill="${a}" opacity=".16"/>
          <rect x="78" y="78" width="1044" height="744" rx="56" fill="white" filter="url(#s)"/>
          <rect x="118" y="118" width="964" height="180" rx="38" fill="url(#g)"/>
          <text x="166" y="228" fill="white" font-family="Arial, sans-serif" font-size="76" font-weight="800">MBTI ${safeTitle}</text>
          <text x="166" y="276" fill="white" opacity=".86" font-family="Arial, sans-serif" font-size="32">${tag} sample material</text>
          <g transform="translate(150 360)">
            <rect width="250" height="250" rx="42" fill="${a}" opacity=".14"/>
            <circle cx="125" cy="92" r="52" fill="${a}"/>
            <path d="M60 210c14-56 50-86 65-86s51 30 65 86" fill="${a}" opacity=".88"/>
          </g>
          <g transform="translate(455 368)" fill="#263040" font-family="Arial, sans-serif">
            <text font-size="44" font-weight="800">見る・話す・比べる</text>
            <text y="76" font-size="32" fill="#677386">${safeDesc}</text>
            <rect y="122" width="560" height="22" rx="11" fill="${a}" opacity=".22"/>
            <rect y="174" width="470" height="22" rx="11" fill="${b}" opacity=".36"/>
            <rect y="226" width="520" height="22" rx="11" fill="#27313f" opacity=".12"/>
          </g>
          <g transform="translate(150 682)">
            ${[0,1,2,3].map((n) => `<rect x="${n * 235}" width="190" height="72" rx="24" fill="${n % 2 ? b : a}" opacity=".88"/><text x="${n * 235 + 95}" y="47" text-anchor="middle" fill="white" font-family="Arial" font-size="25" font-weight="800">TYPE ${index + 1}-${n + 1}</text>`).join("")}
          </g>
        </svg>`)}`;
    }

    function imageSrc(item, index) {
      return item[3] || svgData(item, index);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    const gallery = document.querySelector("#gallery");
    const sizeRange = document.querySelector("#sizeRange");
    const imageUpload = document.querySelector("#imageUpload");
    const minCardSize = Number(sizeRange.min);
    const maxCardSize = Number(sizeRange.max);

    function applyCardSize(size) {
      const clampedSize = Math.min(maxCardSize, Math.max(minCardSize, Number(size)));
      document.documentElement.style.setProperty("--card-min", `${clampedSize}px`);
      document.documentElement.style.setProperty("--gap", `${Math.max(12, Math.round(clampedSize * 0.055))}px`);
      sizeRange.value = clampedSize;
    }

    function renderGallery() {
      gallery.innerHTML = materials.map((item, index) => {
        const title = escapeHtml(item[0]);
        const tag = escapeHtml(item[2]);
        const src = escapeHtml(imageSrc(item, index));
        const fallbackSrc = escapeHtml(item[4] || svgData(item, index));
        const finalFallbackSrc = escapeHtml(svgData(item, index));

        return `
          <article class="viewer-card">
            <button class="image-button" type="button" data-index="${index}" aria-label="${title}を表示">
              <div class="image-wrap"><img src="${src}" alt="${title}のサンプル資料" data-fallback-src="${fallbackSrc}" data-final-fallback-src="${finalFallbackSrc}"><span class="badge">${tag}</span></div>
            </button>
          </article>
        `;
      }).join("");
    }

    renderGallery();

    function maximizeFromList(index) {
      applyCardSize(maxCardSize);
      const card = gallery.querySelector(`[data-index="${index}"]`)?.closest(".viewer-card");
      card?.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    applyCardSize(sizeRange.value);

    sizeRange.addEventListener("input", (event) => applyCardSize(event.target.value));

    imageUpload.addEventListener("change", (event) => {
      const files = [...event.target.files].filter((file) => file.type.startsWith("image/"));
      if (!files.length) return;

      const startIndex = materials.length;
      files.forEach((file, offset) => {
        const src = URL.createObjectURL(file);
        const title = file.name.replace(/\.[^/.]+$/, "") || `アップロード画像 ${startIndex + offset + 1}`;
        materials.push([title, "このページ内で一時的に追加された画像", "Upload", src, src]);
      });

      renderGallery();
      maximizeFromList(startIndex);
      event.target.value = "";
    });
    gallery.addEventListener("error", (event) => {
      const image = event.target.closest("img[data-fallback-src]");
      if (!image) return;
      if (!image.dataset.fallbackApplied) {
        image.dataset.fallbackApplied = "true";
        image.src = image.dataset.fallbackSrc;
        return;
      }
      if (!image.dataset.finalFallbackApplied) {
        image.dataset.finalFallbackApplied = "true";
        image.src = image.dataset.finalFallbackSrc;
      }
    }, true);

    gallery.addEventListener("click", (event) => {
      const button = event.target.closest(".image-button");
      if (button) maximizeFromList(Number(button.dataset.index));
    });
  </script>
</body>
</html>
