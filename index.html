<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MBTI 資料</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3eb;
      --panel: rgba(255, 255, 255, 0.88);
      --ink: #27313f;
      --muted: #687386;
      --accent: #6f5de7;
      --accent-2: #19a7a8;
      --ring: rgba(111, 93, 231, 0.28);
      --shadow: 0 18px 45px rgba(42, 39, 58, 0.16);
      --radius: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 201, 121, 0.38), transparent 34rem),
        radial-gradient(circle at 90% 8%, rgba(119, 215, 216, 0.34), transparent 28rem),
        linear-gradient(135deg, #fbf7ef 0%, var(--bg) 55%, #eef7f7 100%);
    }

    button, input { font: inherit; }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    input[type="search"], .tag-input {
      border: 1px solid rgba(104, 115, 134, 0.24);
      border-radius: 999px;
      padding: 11px 14px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.82);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input[type="search"]:focus, .tag-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .paste-highlight {
      outline: 4px solid var(--ring);
      outline-offset: 4px;
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .app-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 3vw, 28px);
    }

    .viewer-card {
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
      padding: 16px;
    }

    .toolbar-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toolbar-title {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 950;
    }

    .toolbar-toggle {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(42, 39, 58, 0.16);
    }

    .toolbar-content {
      display: grid;
      gap: 14px;
    }

    .size-control {
      display: grid;
      grid-template-columns: auto minmax(180px, 420px) auto;
      gap: 12px;
      align-items: center;
      width: min(100%, 620px);
      color: var(--muted);
      font-weight: 800;
    }

    .auth-actions {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 800;
    }

    .auth-button, .upload-button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .auth-button {
      color: var(--accent);
      background: rgba(111, 93, 231, 0.12);
    }

    .upload-control {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border: 0;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 28px rgba(42, 39, 58, 0.18);
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .upload-control:hover, .upload-control:focus-within {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(42, 39, 58, 0.22);
    }

    .upload-control[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .upload-control input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    .search-control {
      display: grid;
      gap: 7px;
      min-width: min(100%, 320px);
      color: var(--muted);
      font-weight: 900;
    }

    .search-control input { width: 100%; }

    .upload-note, .empty-message {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .status-area {
      display: grid;
      gap: 10px;
    }

    .status-message {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 0;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 0.92rem;
      font-weight: 800;
      line-height: 1.55;
    }

    .status-message[hidden] { display: none; }

    .status-message--success {
      color: #146c43;
      background: rgba(25, 135, 84, 0.12);
      border: 1px solid rgba(25, 135, 84, 0.24);
    }

    .status-message--error {
      color: #842029;
      background: rgba(220, 53, 69, 0.12);
      border: 1px solid rgba(220, 53, 69, 0.26);
    }

    .status-content { display: grid; gap: 6px; }

    .status-title {
      display: block;
      font-size: 1rem;
      font-weight: 950;
    }

    .status-detail { margin: 0; }

    .status-close {
      flex: 0 0 auto;
      border: 0;
      border-radius: 999px;
      width: 28px;
      height: 28px;
      color: currentColor;
      background: rgba(255, 255, 255, 0.62);
      cursor: pointer;
      font-weight: 950;
      line-height: 1;
    }

    .empty-message {
      grid-column: 1 / -1;
      padding: 28px;
      text-align: center;
    }

    .size-control input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .gallery {
      display: grid;
      gap: var(--gap, 16px);
      grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min, 240px)), 1fr));
      align-items: start;
    }


    .viewer-card {
      overflow: hidden;
      cursor: pointer;
      transform: translateY(0);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .viewer-card:focus-within, .viewer-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 54px rgba(42, 39, 58, 0.2);
    }

    .toolbar.viewer-card { cursor: default; }
    .toolbar.viewer-card:hover, .toolbar.viewer-card:focus-within { transform: none; }

    .image-button {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .image-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: #e8edf4;
    }

    .image-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }

    .badge {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      color: white;
      background: rgba(39, 49, 63, 0.72);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .card-details {
      display: grid;
      gap: 12px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.64);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 28px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      background: rgba(39, 49, 63, 0.72);
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1;
    }

    .tag-form {
      display: flex;
      gap: 8px;
    }

    .tag-input {
      min-width: 0;
      flex: 1;
    }

    .tag-submit {
      border: 0;
      border-radius: 999px;
      padding: 0 13px;
      color: white;
      background: var(--accent);
      font-weight: 900;
      cursor: pointer;
    }


    @media (max-width: 560px) {
      .app-shell { padding: 12px; }
      .toolbar {
        gap: 10px;
        margin-bottom: 14px;
        padding: 12px;
        border-radius: 20px;
      }
      .toolbar-header { display: flex; }
      .toolbar-content[hidden] { display: none; }
      .toolbar-actions { align-items: stretch; }
      .size-control { grid-template-columns: auto minmax(120px, 1fr) auto; }
      .auth-actions { width: 100%; }
      .upload-control { justify-content: center; width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="toolbar viewer-card" aria-label="一覧操作">
      <div class="toolbar-header">
        <p class="toolbar-title">表示・検索メニュー</p>
        <button id="toolbarToggle" class="toolbar-toggle" type="button" aria-expanded="true" aria-controls="toolbarContent">メニューを閉じる</button>
      </div>
      <div id="toolbarContent" class="toolbar-content">
      <div class="toolbar-actions">
        <label class="size-control" for="sizeRange">
          <span>小</span>
          <input id="sizeRange" type="range" min="160" max="1180" step="20" value="240" aria-label="一覧画像の大きさ">
          <span>大</span>
        </label>
        <label class="search-control" for="searchInput">
          <span>タグ検索</span>
          <input id="searchInput" type="search" placeholder="例: NT、内向、チーム" autocomplete="off" aria-label="タグで資料を検索">
        </label>
        <div class="auth-actions" aria-live="polite">
          <span id="authStatus">ログインしていません</span>
          <button id="loginButton" class="auth-button" type="button">Googleでログイン</button>
          <button id="logoutButton" class="auth-button" type="button" hidden>ログアウト</button>
        </div>
        <label id="uploadControl" class="upload-control" for="imageUpload" aria-disabled="true">
          <span id="uploadLabel">画像を追加</span>
          <input id="imageUpload" type="file" accept="image/*" multiple aria-label="追加する画像を選択" disabled>
        </label>
      </div>
      <div class="status-area" aria-live="polite">
        <p id="uploadNote" class="upload-note">PCでは画像ファイルの選択に加えて、クリップボードの画像をそのまま Ctrl+V / ⌘V で貼り付けて追加できます。アップロードにはGoogleログインが必要です。</p>
        <div id="operationStatus" class="status-message" hidden></div>
      </div>
      </div>
    </section>
    <section id="gallery" class="gallery" aria-label="MBTI資料サンプル一覧"></section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, onAuthStateChanged, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, addDoc, collection, onSnapshot, orderBy, query, serverTimestamp, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { getDownloadURL, getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDwIdnlDMOsu_dVvyDluC7TI-aa_dK6SFs",
      authDomain: "mbti-materials.firebaseapp.com",
      projectId: "mbti-materials",
      storageBucket: "mbti-materials.firebasestorage.app",
      messagingSenderId: "454015561766",
      appId: "1:454015561766:web:c749e2a5e57d20dffbb6e7"
    };

    // 管理者UIDはこの1か所だけ変更してください。Security RulesのADMIN_UIDと同じ値にします。
    const ADMIN_UID = "AutvrLYLvOfLUHhSbnVSaQMe9AT2";
    const MAX_IMAGE_SIZE_BYTES = 10 * 1024 * 1024;

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    const materials = [];
    let currentUser = null;
    let isUploading = false;

    const gallery = document.querySelector("#gallery");
    const sizeRange = document.querySelector("#sizeRange");
    const imageUpload = document.querySelector("#imageUpload");
    const searchInput = document.querySelector("#searchInput");
    const uploadNote = document.querySelector("#uploadNote");
    const authStatus = document.querySelector("#authStatus");
    const loginButton = document.querySelector("#loginButton");
    const logoutButton = document.querySelector("#logoutButton");
    const uploadControl = document.querySelector("#uploadControl");
    const uploadLabel = document.querySelector("#uploadLabel");
    const operationStatus = document.querySelector("#operationStatus");
    const toolbarToggle = document.querySelector("#toolbarToggle");
    const toolbarContent = document.querySelector("#toolbarContent");
    const mobileToolbarQuery = window.matchMedia("(max-width: 560px)");
    const minCardSize = Number(sizeRange.min);
    const maxCardSize = Number(sizeRange.max);

    function canUpload() {
      return Boolean(currentUser && currentUser.uid === ADMIN_UID);
    }

    function setToolbarExpanded(isExpanded) {
      toolbarContent.hidden = !isExpanded;
      toolbarToggle.setAttribute("aria-expanded", String(isExpanded));
      toolbarToggle.textContent = isExpanded ? "メニューを閉じる" : "メニューを開く";
    }

    function syncToolbarForViewport() {
      setToolbarExpanded(!mobileToolbarQuery.matches);
    }

    function setMessage(message) {
      uploadNote.textContent = message;
    }

    function clearOperationStatus() {
      operationStatus.hidden = true;
      operationStatus.className = "status-message";
      operationStatus.innerHTML = "";
    }

    function showSuccessMessage(message) {
      operationStatus.hidden = false;
      operationStatus.className = "status-message status-message--success";
      operationStatus.innerHTML = `
        <div class="status-content">
          <strong class="status-title">処理完了</strong>
          <p class="status-detail">${escapeHtml(message)}</p>
        </div>
        <button class="status-close" type="button" aria-label="成功メッセージを閉じる">×</button>
      `;
    }

    function getFirebaseUserMessage(errorCode, stage) {
      if (errorCode === "storage/unauthorized") return "Storageのアクセス権限によってアップロードまたは取得が拒否されました。";
      if (errorCode?.startsWith("storage/")) return "Storage処理で権限または通信の問題が発生しました。";
      if (errorCode?.startsWith("auth/")) return "Googleログインまたはログアウトの認証処理で問題が発生しました。";
      if (errorCode?.startsWith("firestore/")) return "Firestoreの読み書き権限または通信に問題が発生しました。";
      if (stage?.includes("Firestore")) return "Firestoreの処理中に問題が発生しました。";
      return "Firebase処理で問題が発生しました。時間をおいて再度お試しください。";
    }

    function showFirebaseError(stage, error) {
      const errorCode = error?.code || "コードなし";
      const errorMessage = error?.message || String(error || "詳細不明のエラー");
      const userMessage = getFirebaseUserMessage(error?.code, stage);
      operationStatus.hidden = false;
      operationStatus.className = "status-message status-message--error";
      operationStatus.innerHTML = `
        <div class="status-content">
          <strong class="status-title">Firebaseエラー</strong>
          <p class="status-detail">処理：${escapeHtml(stage)}</p>
          <p class="status-detail">コード：${escapeHtml(errorCode)}</p>
          <p class="status-detail">内容：${escapeHtml(errorMessage)}</p>
          <p class="status-detail">${escapeHtml(userMessage)}</p>
        </div>
        <button class="status-close" type="button" aria-label="エラーメッセージを閉じる">×</button>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[char]));
    }

    function applyCardSize(size) {
      const clampedSize = Math.min(maxCardSize, Math.max(minCardSize, Number(size)));
      document.documentElement.style.setProperty("--card-min", `${clampedSize}px`);
      document.documentElement.style.setProperty("--gap", `${Math.max(12, Math.round(clampedSize * 0.055))}px`);
      sizeRange.value = clampedSize;
    }

    function itemTags(item) {
      return Array.isArray(item.tags) ? item.tags : [];
    }

    function matchesSearch(item, queryText) {
      if (!queryText) return true;
      return itemTags(item).some((tag) => tag.toLowerCase().includes(queryText));
    }

    function renderGallery() {
      const queryText = searchInput.value.trim().toLowerCase();
      const visibleItems = materials
        .map((item, index) => ({ item, index }))
        .filter(({ item }) => matchesSearch(item, queryText));

      if (!visibleItems.length) {
        gallery.innerHTML = `<p class="empty-message">${queryText ? "一致するタグの画像がありません。別のキーワードで検索してください。" : "Firestoreに保存された画像はまだありません。"}</p>`;
        return;
      }

      gallery.innerHTML = visibleItems.map(({ item, index }) => {
        const title = escapeHtml(item.title || item.originalFileName || "無題の画像");
        const tags = itemTags(item).map((value) => `<span class="tag-chip">${escapeHtml(value)}</span>`).join("");
        const src = escapeHtml(item.imageUrl);
        const canEditTags = canUpload();

        return `
          <article class="viewer-card">
            <button class="image-button" type="button" data-index="${index}" aria-label="${title}を表示">
              <div class="image-wrap"><img src="${src}" alt="${title}"><span class="badge">${escapeHtml(item.originalFileName || "画像")}</span></div>
            </button>
            <div class="card-details">
              <div class="tag-list" aria-label="${title}のタグ">${tags || "<span class=\"upload-note\">タグなし</span>"}</div>
              <form class="tag-form" data-index="${index}" aria-label="${title}にタグを追加">
                <input class="tag-input" name="tag" type="text" placeholder="タグを追加" autocomplete="off" aria-label="追加するタグ" ${canEditTags ? "" : "disabled"}>
                <button class="tag-submit" type="submit" ${canEditTags ? "" : "disabled"}>追加</button>
              </form>
            </div>
          </article>
        `;
      }).join("");
    }

    function updateAuthUi() {
      const uploadAllowed = canUpload() && !isUploading;
      imageUpload.disabled = !uploadAllowed;
      uploadControl.setAttribute("aria-disabled", String(!uploadAllowed));
      uploadLabel.textContent = isUploading ? "アップロード中..." : "画像を追加";
      loginButton.hidden = Boolean(currentUser);
      logoutButton.hidden = !currentUser;
      authStatus.textContent = currentUser ? `${currentUser.displayName || "ログイン中"}でログイン中` : "ログインしていません";
      if (!currentUser) setMessage("閲覧はログイン不要です。アップロードするにはGoogleログインしてください。");
      else if (!canUpload()) setMessage("このGoogleアカウントにはアップロード権限がありません。管理者UIDを設定してください。");
      else setMessage("画像ファイルを選択、または Ctrl+V / ⌘V で貼り付けてアップロードできます。");
      renderGallery();
    }

    function maximizeFromList(index) {
      applyCardSize(maxCardSize);
      const card = gallery.querySelector(`[data-index="${index}"]`)?.closest(".viewer-card");
      card?.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function validateImageFile(file) {
      if (!file.type.startsWith("image/")) return `${file.name || "選択ファイル"}は画像ファイルではありません。`;
      if (file.size > MAX_IMAGE_SIZE_BYTES) return `${file.name || "画像"}はサイズ上限（10MB）を超えています。`;
      return "";
    }

    async function uploadImageFiles(files, sourceLabel = "Upload") {
      if (!canUpload()) {
        setMessage("アップロードには管理者Googleアカウントでのログインが必要です。");
        return false;
      }

      const fileList = [...files];
      const errors = fileList.map(validateImageFile).filter(Boolean);
      const imageFiles = fileList.filter((file) => !validateImageFile(file));
      if (errors.length) {
        console.warn("Rejected files", errors);
        setMessage(errors[0]);
      }
      if (!imageFiles.length) return false;

      isUploading = true;
      updateAuthUi();
      setMessage(`${imageFiles.length}枚の画像をアップロード中です...`);

      try {
        await Promise.all(imageFiles.map(async (file) => {
          const extension = file.name.includes(".") ? file.name.split(".").pop().toLowerCase() : "bin";
          const uniqueName = `${crypto.randomUUID()}.${extension}`;
          const storagePath = `users/${currentUser.uid}/images/${uniqueName}`;
          const storageRef = ref(storage, storagePath);
          let imageUrl = "";

          try {
            await uploadBytes(storageRef, file, { contentType: file.type });
          } catch (error) {
            console.error("Firebase upload failed at Storage upload", error);
            showFirebaseError("Storageアップロード", error);
            throw error;
          }

          try {
            imageUrl = await getDownloadURL(storageRef);
          } catch (error) {
            console.error("Firebase upload failed at download URL retrieval", error);
            showFirebaseError("ダウンロードURL取得", error);
            throw error;
          }

          try {
            await addDoc(collection(db, "materials"), {
              title: file.name?.replace(/\.[^/.]+$/, "") || `${sourceLabel}画像`,
              tags: [],
              imageUrl,
              storagePath,
              ownerId: currentUser.uid,
              originalFileName: file.name || uniqueName,
              createdAt: serverTimestamp()
            });
          } catch (error) {
            console.error("Firebase upload failed at Firestore registration", error);
            showFirebaseError("Firestore登録", error);
            throw error;
          }
        }));
        showSuccessMessage(`${imageFiles.length}枚の画像をアップロードしました。`);
        return true;
      } catch (error) {
        return false;
      } finally {
        isUploading = false;
        updateAuthUi();
      }
    }

    loginButton.addEventListener("click", async () => {
      try { await signInWithPopup(auth, provider); }
      catch (error) {
        console.error("Google login failed", error);
        showFirebaseError("Googleログイン", error);
      }
    });

    logoutButton.addEventListener("click", async () => {
      try { await signOut(auth); }
      catch (error) {
        console.error("Logout failed", error);
        showFirebaseError("ログアウト", error);
      }
    });

    imageUpload.addEventListener("change", async (event) => {
      await uploadImageFiles(event.target.files);
      event.target.value = "";
    });

    document.addEventListener("paste", async (event) => {
      const clipboardFiles = [...event.clipboardData?.items || []]
        .filter((item) => item.kind === "file")
        .map((item) => item.getAsFile())
        .filter(Boolean);
      if (!clipboardFiles.length) return;
      event.preventDefault();
      await uploadImageFiles(clipboardFiles, "Paste");
      document.body.classList.add("paste-highlight");
      window.setTimeout(() => document.body.classList.remove("paste-highlight"), 420);
    });

    gallery.addEventListener("submit", async (event) => {
      const form = event.target.closest(".tag-form");
      if (!form) return;
      event.preventDefault();
      if (!canUpload()) {
        setMessage("タグ追加には管理者Googleアカウントでのログインが必要です。");
        return;
      }
      const input = form.elements.tag;
      const value = input.value.trim();
      if (!value) return;
      const item = materials[Number(form.dataset.index)];
      const tags = itemTags(item);
      if (tags.some((tag) => tag.toLowerCase() === value.toLowerCase())) {
        input.value = "";
        return;
      }
      try {
        await updateDoc(doc(db, "materials", item.id), { tags: [...tags, value] });
        input.value = "";
      } catch (error) {
        console.error("Tag update failed", error);
        showFirebaseError("タグ更新", error);
      }
    });

    gallery.addEventListener("click", (event) => {
      const button = event.target.closest(".image-button");
      if (button) maximizeFromList(Number(button.dataset.index));
    });

    operationStatus.addEventListener("click", (event) => {
      if (event.target.closest(".status-close")) clearOperationStatus();
    });

    toolbarToggle.addEventListener("click", () => {
      setToolbarExpanded(toolbarContent.hidden);
    });

    mobileToolbarQuery.addEventListener("change", syncToolbarForViewport);

    sizeRange.addEventListener("input", (event) => applyCardSize(event.target.value));
    searchInput.addEventListener("input", renderGallery);
    syncToolbarForViewport();
    applyCardSize(sizeRange.value);
    updateAuthUi();

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      updateAuthUi();
    });

    onSnapshot(query(collection(db, "materials"), orderBy("createdAt", "desc")), (snapshot) => {
      materials.splice(0, materials.length, ...snapshot.docs.map((documentSnapshot) => ({
        id: documentSnapshot.id,
        ...documentSnapshot.data()
      })));
      renderGallery();
    }, (error) => {
      console.error("Firestore materials subscription failed", error);
      showFirebaseError("Firestore一覧取得", error);
    });
  </script>
</body>
</html>
